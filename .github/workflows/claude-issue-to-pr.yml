name: Claude — issue vers PR

# À la création d'une issue (par un auteur autorisé), Claude implémente la
# demande (évolution de l'app, correction de bug, préférence d'affichage…),
# ouvre une PR vers main et poste le lien de la PR dans l'issue.
# La preview de la PR est ensuite déployée par preview.yml → testable en live.

on:
  issues:
    types: [opened, reopened]

permissions:
  contents: write
  issues: write
  pull-requests: write
  # Requis par claude-code-action pour l'échange OIDC avec l'app GitHub Claude
  id-token: write
  actions: read

concurrency:
  group: claude-issue-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  implement:
    # N'agit que si l'auteur de l'issue est le propriétaire ou un collaborateur
    # du dépôt (accès write) — statut collaborateur natif de GitHub — ET si
    # l'événement n'est pas déclenché par un bot : quand une PR porte
    # « Closes #N » sur une issue déjà fermée, claude[bot] la rouvre, et ce
    # reopen relançait ce workflow — commentaire « Claude a pris cette issue en
    # charge » trompeur, puis run rouge sur le garde-fou interne de
    # claude-code-action (« Workflow initiated by non-human actor »).
    if: |
      github.event.sender.type != 'Bot'
      && contains(fromJSON('["OWNER","COLLABORATOR","MEMBER"]'), github.event.issue.author_association)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Visibilité immédiate : on poste nous-mêmes le commentaire de démarrage.
      # (Pas de track_progress : il force le « tag mode », dans lequel Claude ne
      # crée plus la PR lui-même — il ne poste qu'un lien pré-rempli, au body
      # tronqué. Cf. FAQ de claude-code-action.)
      - name: Commenter le démarrage sur l'issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.issue.number }} -R ${{ github.repository }} --body \
            "🤖 **Claude a pris cette issue en charge** : il implémente la demande puis ouvrira une pull request (compter quelques minutes). [Suivre le travail en direct](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"

      - uses: anthropics/claude-code-action@v1
        id: claude
        with:
          # Authentification via l'abonnement Claude (Pro/Max), pas de
          # facturation API. Token généré localement par `claude setup-token`.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # En mode agent (prompt fourni), seule la lecture/édition de fichiers
          # est permise par défaut : on autorise tout Bash (le runner est jetable
          # et isolé) pour que Claude puisse pousser sa branche, créer la PR,
          # commenter l'issue et tester librement.
          #
          # --max-turns : c'est le job le plus lourd du dépôt (implémenter, puis
          # tout le rituel de CLAUDE.md — captures Playwright, worktree
          # pr-assets, pr-images-check —, puis PR, puis commentaire). Le run de
          # l'issue #83 a atteint le plafond de 100 tours APRÈS avoir créé la PR
          # #84 mais AVANT d'en poster le lien sur l'issue : run rouge et
          # demandeur laissé sans réponse, alors que le travail était fait. Les
          # runs qui aboutissent tournent entre 6 et 63 tours ; 200 laisse de la
          # marge aux demandes doubles sans jamais laisser un run partir en vrille.
          claude_args: |
            --model claude-sonnet-5
            --max-turns 200
            --allowedTools "Bash"
          prompt: |
            Tu es déclenché par la création de l'issue #${{ github.event.issue.number }}
            dans le dépôt ${{ github.repository }}.

            Titre de l'issue : "${{ github.event.issue.title }}"

            Ce dépôt contient « Bémol », la web app de visualisation du planning
            de l'Orchestre de la Suisse Romande (voir CLAUDE.md et README.md).
            Cette issue est une demande d'évolution ou une correction de bug.
            Lis attentivement la description de l'issue, puis :

            1. Implémente la demande en respectant SCRUPULEUSEMENT les
               conventions du fichier CLAUDE.md (site statique sans build,
               chemins relatifs uniquement, interface en français,
               mobile-friendly, ne jamais éditer les fichiers de data/ à la
               main).
            2. Crée une nouvelle branche et ouvre une pull request vers `main`
               avec ton implémentation. Titre clair ; description structurée
               selon la section « Descriptions de PR » de CLAUDE.md — elle
               COMMENCE par le pourquoi (reprends la motivation et le contexte
               exprimés dans l'issue : la description doit se suffire à
               elle-même, sans avoir l'issue sous les yeux), puis le quoi,
               puis comment vérifier ; captures d'écran si le changement est
               visible (section « Captures d'écran dans les PRs »). Termine
               par « Closes #${{ github.event.issue.number }} » — ainsi
               l'issue se ferme automatiquement au merge : ne jamais
               l'omettre.
               Cas particuliers : si la demande est une simple question,
               réponds en commentaire sans ouvrir de PR ; si après analyse il
               n'y a rien à changer (malentendu, comportement voulu), explique
               pourquoi en commentaire et FERME l'issue
               (`gh issue close ${{ github.event.issue.number }}`).
            3. Poste un commentaire en français sur l'issue
               #${{ github.event.issue.number }} avec le lien vers la PR créée,
               en invitant l'auteur à :
                 - tester la preview (déployée automatiquement sur la PR, le lien
                   y est posté en commentaire) ;
                 - laisser ses retours en commentant « @claude … » directement sur
                   la PR pour que tu fasses les ajustements.

            Les utilisateurs sont des musiciens de l'orchestre, pas des
            développeurs : reste clair, simple et pédagogue dans tes réponses.

      # Un run rouge est aujourd'hui une BOÎTE NOIRE : le log du job ne contient
      # que l'init et le résultat final (« error_max_turns »,
      # « permission_denials_count: 7 ») — impossible de savoir où sont partis
      # les tours ni quels outils ont été refusés. On archive donc la
      # transcription complète, seul moyen de diagnostiquer le prochain échec.
      - name: Archiver la transcription du run Claude
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: claude-transcription-issue-${{ github.event.issue.number }}
          path: ${{ steps.claude.outputs.execution_file }}
          if-no-files-found: warn
          retention-days: 30
