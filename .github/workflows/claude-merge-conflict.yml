name: Claude — résoudre les conflits de merge

# Une PR mise en conflit avec main par d'autres PRs mergées entre-temps reste
# bloquée indéfiniment (l'auto-merge, si actif, ne peut jamais se déclencher ;
# sans auto-merge, il faut de toute façon un rebase avant de pouvoir merger) et
# personne n'est notifié, elle stagne juste. Ce workflow réagit à chaque push
# sur main (l'évènement qui crée ce genre de conflit) : il repère TOUTES les
# PRs ouvertes (hors brouillons) dont l'état de merge est DIRTY (conflit), et
# déclenche Claude sur chacune pour fusionner main, résoudre le conflit et
# repousser sur la branche.
#
# Les PRs en brouillon sont exclues : leur auteur est probablement encore en
# plein travail dessus, un merge de main poussé par Claude au mauvais moment
# gênerait plus qu'il n'aiderait.
#
# Garde anti-boucle : si le dernier commit de la branche est déjà une
# résolution de conflit de ce workflow (préfixe « merge: résout le conflit
# avec main ») et qu'elle est encore en conflit, Claude n'essaie pas à nouveau
# — il commente en mentionnant @isc.

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write
  # Requis par claude-code-action pour l'échange OIDC avec l'app GitHub Claude
  id-token: write
  actions: read

jobs:
  detect:
    runs-on: ubuntu-latest
    concurrency:
      group: claude-merge-conflict-detect
      cancel-in-progress: true
    outputs:
      prs: ${{ steps.list.outputs.prs }}
    steps:
      - name: Repérer les PRs en conflit
        id: list
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # GitHub recalcule l'état de merge de façon asynchrone après un push
          # sur main : on patiente tant que des PRs sont encore à l'état
          # UNKNOWN (jusqu'à ~100s), pour ne pas rater un conflit qui vient
          # d'apparaître.
          attempt=0
          until [ "$attempt" -ge 10 ]; do
            data=$(gh pr list -R "${{ github.repository }}" --state open \
              --json number,headRefName,mergeStateStatus,isDraft,isCrossRepository)
            if ! jq -e 'any(.[]; .mergeStateStatus == "UNKNOWN")' <<<"$data" >/dev/null; then
              break
            fi
            attempt=$((attempt + 1))
            sleep 10
          done
          prs=$(jq -c '[.[] | select(
              .mergeStateStatus == "DIRTY"
              and .isDraft == false
              and .isCrossRepository == false
            ) | {number, headRefName}]' <<<"$data")
          echo "prs=$prs" >> "$GITHUB_OUTPUT"

  resolve:
    needs: detect
    if: needs.detect.outputs.prs != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pr: ${{ fromJson(needs.detect.outputs.prs) }}
    concurrency:
      group: claude-merge-conflict-${{ matrix.pr.headRefName }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ matrix.pr.headRefName }}
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model claude-sonnet-5
            --max-turns 100
            --allowedTools "Bash"
          prompt: |
            La branche `${{ matrix.pr.headRefName }}` (PR #${{ matrix.pr.number }}
            du dépôt ${{ github.repository }}) est en conflit avec `main`, suite à
            d'autres PRs mergées entre-temps (si l'auto-merge est activé dessus,
            il reste bloqué tant que le conflit persiste).

            Le dépôt de travail est déjà positionné sur cette branche, avec tout
            l'historique (`origin/main` est disponible). Ta mission :

            1. GARDE ANTI-BOUCLE : si `git log -1 --format=%s` montre que le
               dernier commit commence déjà par « merge: résout le conflit avec
               main », n'essaie PAS de refaire un merge. Poste un commentaire sur
               la PR #${{ matrix.pr.number }} expliquant ce qui bloque encore, en
               mentionnant @isc pour qu'un humain tranche, et termine là.
            2. Sinon, lance `git merge origin/main`.
               - Si ça passe sans conflit, le merge est déjà committé par git :
                 pousse directement sur `${{ matrix.pr.headRefName }}`.
               - En cas de conflit, résous-le fichier par fichier en comprenant
                 l'intention de CHAQUE côté (celle de cette PR et celle déjà
                 mergée sur main) plutôt qu'en prenant systématiquement un côté.
                 Respecte SCRUPULEUSEMENT les conventions de CLAUDE.md (site
                 statique sans build, chemins relatifs uniquement, etc.). Si le
                 conflit touche `data/` ou `productions.json`, garde la version
                 de main : ce sont des fichiers générés, jamais mergés à la main
                 (cf. CLAUDE.md, section « Pipeline de données »).
               - Une fois tous les marqueurs `<<<<<<<`/`=======`/`>>>>>>>`
                 éliminés, termine le merge avec
                 `git commit -m "merge: résout le conflit avec main"` puis pousse
                 sur `${{ matrix.pr.headRefName }}`.
            3. Poste un commentaire bref en français sur la PR
               #${{ matrix.pr.number }} expliquant quel conflit a été résolu et
               comment. Les utilisateurs sont des musiciens de l'orchestre, pas
               des développeurs — reste clair et simple, sans jargon.
