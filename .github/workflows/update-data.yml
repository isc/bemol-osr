name: Mise à jour des données ICS

# Toutes les 2 heures : télécharge l'export ICS (URL secrète, elle contient un
# jeton d'accès), régénère data/planning.json + data/changes.json, committe si
# quelque chose a changé, puis republie le site.
#
# Le push est fait avec le GITHUB_TOKEN, qui ne déclenche PAS les autres
# workflows (protection anti-récursion de GitHub) : on publie donc gh-pages
# directement ici plutôt que de compter sur deploy.yml.

on:
  schedule:
    - cron: "23 */2 * * *"
  workflow_dispatch:

permissions:
  contents: write
  # Pour signaler un échec du cron dans une issue (voir dernière étape)
  issues: write

concurrency:
  # Même groupe que deploy.yml / preview.yml : sérialise les écritures gh-pages.
  group: gh-pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Récupérer et convertir l'ICS
        env:
          ICS_URL: ${{ secrets.ICS_URL }}
        run: node scripts/update-data.mjs

      - name: Committer les données si elles ont changé
        id: commit
        run: |
          git add data/
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Aucun changement de planning."
          else
            git config user.name 'github-actions[bot]'
            git config user.email 'github-actions[bot]@users.noreply.github.com'
            git commit -m "data: mise à jour du planning ICS"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # Cache-busting automatique : même mécanisme que deploy.yml, pour que la
      # copie d'index.html republiée ici garde un ?v= résolu (pas le
      # placeholder « dev »).
      - name: Cache-busting (?v= → SHA du commit)
        if: steps.commit.outputs.changed == 'true'
        run: sed -i "s/?v=[^\"']*/?v=${GITHUB_SHA:0:12}/g" index.html

      - name: Republier le site (gh-pages)
        if: steps.commit.outputs.changed == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          keep_files: true
          exclude_assets: ".github,.gitignore,.prettierrc,README.md,scripts"
          commit_message: "deploy: data update @ ${{ github.sha }}"

      # Panne silencieuse : personne ne surveille l'onglet Actions. Si le run
      # échoue (jeton ICS invalide, changement côté Dièse, incident GitHub…),
      # on ouvre une issue — donc une notification. Les échecs suivants
      # commentent la même issue tant qu'elle est ouverte ; la refermer une
      # fois le problème réglé.
      - name: Signaler l'échec dans une issue
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TITLE: "⚠️ La mise à jour automatique du planning ICS échoue"
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          num=$(gh issue list -R "${{ github.repository }}" --state open \
            --search "\"$TITLE\" in:title" --json number --jq '.[0].number')
          if [ -n "$num" ]; then
            gh issue comment "$num" -R "${{ github.repository }}" \
              --body "Nouvel échec du cron : $RUN_URL"
          else
            gh issue create -R "${{ github.repository }}" --title "$TITLE" --body \
              "Le robot qui actualise le planning (toutes les 2 h depuis l'export ICS de Dièse) vient d'échouer : $RUN_URL

          Tant que ce problème dure, le site continue de fonctionner mais affiche des données de plus en plus anciennes (un bandeau d'avertissement apparaît dans l'app au-delà de 26 h).

          Causes possibles : jeton du lien ICS invalide ou expiré (secret \`ICS_URL\`), changement côté Dièse, incident GitHub. Les échecs suivants seront ajoutés en commentaire ici. **Fermer cette issue une fois le problème réglé.**

          cc @isc"
          fi
