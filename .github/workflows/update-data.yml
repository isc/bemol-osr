name: Mise à jour des données ICS

# Toutes les 2 heures : télécharge l'export ICS (URL secrète, elle contient un
# jeton d'accès), régénère data/planning.json + data/changes.json et publie le
# résultat DIRECTEMENT sur gh-pages (dossier data/), sans jamais pousser sur
# main. Ainsi main ne contient que du code (protégeable par la CI requise) et
# les données vivantes n'existent que sur gh-pages ; main garde un simple
# instantané de data/ pour le dev local et le smoke test.
#
# L'état précédent des données est récupéré depuis gh-pages avant de lancer le
# script, pour que le journal des différences (changes.json) reste continu.

on:
  schedule:
    - cron: "23 */2 * * *"
  workflow_dispatch:

permissions:
  contents: write
  # Pour signaler un échec du cron dans une issue (voir dernière étape)
  issues: write

concurrency:
  # Même groupe que deploy.yml / preview.yml / update-memo.yml : sérialise
  # toutes les écritures sur gh-pages (et évite les races entre crons).
  group: gh-pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Les données de référence (pour le diff) sont celles actuellement
      # servies, pas l'instantané de main.
      - name: Récupérer les données actuelles depuis gh-pages
        id: current
        run: |
          git fetch -q origin gh-pages
          if git checkout -q FETCH_HEAD -- data/; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "gh-pages sans data/ (premier run, ou publication précédente incomplète)"
          fi

      - name: Récupérer et convertir l'ICS
        env:
          ICS_URL: ${{ secrets.ICS_URL }}
        run: node scripts/update-data.mjs

      # Si gh-pages n'avait pas encore de data/ (cf. étape précédente), on
      # publie toujours : comparer au `git diff` par défaut reviendrait à
      # comparer au seul instantané de main, qui peut coïncider par hasard
      # avec le résultat frais et laisser gh-pages sans données.
      - name: Détecter un changement
        id: diff
        run: |
          if [ "${{ steps.current.outputs.found }}" = "false" ] || ! git diff --quiet -- data/; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Aucun changement de planning."
          fi

      - name: Publier les données (gh-pages/data)
        if: steps.diff.outputs.changed == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./data
          destination_dir: data
          publish_branch: gh-pages
          keep_files: true
          commit_message: "data: mise à jour du planning ICS"

      # Panne silencieuse : personne ne surveille l'onglet Actions. Si le run
      # échoue (jeton ICS invalide, changement côté Dièse, incident GitHub…),
      # on ouvre une issue — donc une notification. Les échecs suivants
      # commentent la même issue tant qu'elle est ouverte ; la refermer une
      # fois le problème réglé.
      - name: Signaler l'échec dans une issue
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TITLE: "⚠️ La mise à jour automatique du planning ICS échoue"
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          num=$(gh issue list -R "${{ github.repository }}" --state open \
            --search "\"$TITLE\" in:title" --json number --jq '.[0].number')
          if [ -n "$num" ]; then
            gh issue comment "$num" -R "${{ github.repository }}" \
              --body "Nouvel échec du cron : $RUN_URL"
          else
            gh issue create -R "${{ github.repository }}" --title "$TITLE" --body \
              "Le robot qui actualise le planning (toutes les 2 h depuis l'export ICS de Dièse) vient d'échouer : $RUN_URL

          Tant que ce problème dure, le site continue de fonctionner mais affiche des données de plus en plus anciennes (un bandeau d'avertissement apparaît dans l'app au-delà de 26 h).

          Causes possibles : jeton du lien ICS invalide ou expiré (secret \`ICS_URL\`), changement côté Dièse, incident GitHub. Les échecs suivants seront ajoutés en commentaire ici. **Fermer cette issue une fois le problème réglé.**

          cc @isc"
          fi
