<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bémol · Planning OSR</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎼</text></svg>" />
    <link rel="stylesheet" href="style.css?v=2026-07-03b" />
  </head>
  <body>
    <header>
      <div class="header-row">
        <h1>♭ Bémol <span class="subtitle">Planning OSR</span></h1>
        <div class="header-controls">
          <nav id="view-nav">
            <button data-view="grille">Grille</button>
            <button data-view="agenda">Agenda</button>
            <button data-view="modifs">
              Modifs<span id="modifs-badge" class="badge" hidden></span>
            </button>
          </nav>
          <button id="today-btn" title="Aller à aujourd'hui">Aujourd'hui</button>
          <button id="prefs-btn" title="Préférences d'affichage">⚙</button>
        </div>
      </div>
      <div id="legend"></div>
    </header>

    <main id="main">
      <p id="loading">Chargement du planning…</p>
    </main>

    <footer>
      <span id="update-info"></span>
      <span>Source : export ICS Dièse · <a href="https://github.com/isc/bemol-osr">GitHub</a></span>
    </footer>

    <dialog id="detail-dialog">
      <div id="detail-content"></div>
      <form method="dialog"><button class="close-btn">Fermer</button></form>
    </dialog>

    <dialog id="prefs-dialog">
      <h2>Préférences d'affichage</h2>
      <div id="prefs-content"></div>
      <form method="dialog"><button class="close-btn">Fermer</button></form>
    </dialog>

    <!-- Le suffixe ?v=… force les navigateurs à recharger les fichiers après
         une mise à jour (sinon la version en cache masque les nouveautés).
         À incrémenter lors d'un changement visible d'interface. -->
    <script src="app.js?v=2026-07-03b"></script>
  </body>
</html>
