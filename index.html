<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Bémol · Planning OSR</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎼</text></svg>"
    />

    <!-- Application installable (« Ajouter à l'écran d'accueil ») : manifeste,
         couleur de barre d'état et icônes iOS. Tout en chemins relatifs. -->
    <link rel="manifest" href="manifest.webmanifest" />
    <meta name="theme-color" content="#1d1912" />
    <!-- Applique le mode sombre avant le premier rendu (évite un flash blanc)
         si l'utilisateur l'a choisi, ou si "auto" (par défaut) et que le
         système est en sombre. Logique complète (bascule, écoute des
         changements système) dans app.js. L'en-tête « programme de concert »
         (theme-color ci-dessus) ne change pas avec le thème. -->
    <script>
      ;(function () {
        try {
          var prefs = JSON.parse(localStorage.getItem("bemol-prefs") || "{}")
          var theme = prefs.theme || "auto"
          var dark =
            theme === "dark" ||
            (theme !== "light" &&
              window.matchMedia("(prefers-color-scheme: dark)").matches)
          if (dark) {
            document.documentElement.dataset.theme = "dark"
          }
        } catch (e) {}
      })()
    </script>
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Bémol" />
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />

    <link rel="stylesheet" href="style.css?v=0672ee0478bb" />
  </head>
  <body>
    <header>
      <div class="header-row">
        <h1>♭ Bémol <span class="subtitle">Planning OSR</span></h1>
        <div class="header-controls">
          <nav id="view-nav">
            <button data-view="grille">Grille</button>
            <button data-view="agenda">Agenda</button>
            <button data-view="modifs">
              Modifs<span id="modifs-badge" class="badge" hidden></span>
            </button>
            <button data-view="recherche">Recherche</button>
          </nav>
          <button id="today-btn" title="Aller à aujourd'hui">
            Aujourd'hui
          </button>
          <button id="prefs-btn" title="Préférences d'affichage">⚙</button>
          <button id="subscribe-btn" title="S'abonner au calendrier">📅</button>
          <!-- Pas d'émoji : ils ne se recolorent pas et se lisent mal sur
               le bouton doré (CTA) de l'en-tête sombre. -->
          <button id="install-btn" title="Installer l'application" hidden>
            Installer l'app
          </button>
        </div>
      </div>
      <div id="legend"></div>
    </header>

    <main id="main">
      <p id="loading">Chargement du planning…</p>
    </main>

    <footer>
      <span id="update-info"></span>
      <span
        >Source : export ICS Dièse ·
        <a href="https://github.com/isc/bemol-osr">GitHub</a></span
      >
    </footer>

    <dialog id="detail-dialog">
      <div id="detail-content" class="detail-box"></div>
      <form method="dialog"><button class="close-btn">Fermer</button></form>
    </dialog>

    <dialog id="liste-dialog">
      <div id="liste-content" class="detail-box"></div>
      <form method="dialog"><button class="close-btn">Fermer</button></form>
    </dialog>

    <dialog id="prefs-dialog">
      <div class="dialog-head">
        <h2>Préférences d'affichage</h2>
        <form method="dialog">
          <button class="close-btn-top" aria-label="Fermer">✕</button>
        </form>
      </div>
      <div id="prefs-content"></div>
      <form method="dialog"><button class="close-btn">Fermer</button></form>
    </dialog>

    <dialog id="subscribe-dialog">
      <div class="dialog-head">
        <h2>S'abonner au calendrier</h2>
        <form method="dialog">
          <button class="close-btn-top" aria-label="Fermer">✕</button>
        </form>
      </div>
      <div id="subscribe-content"></div>
      <form method="dialog"><button class="close-btn">Fermer</button></form>
    </dialog>

    <dialog id="install-dialog">
      <div class="dialog-head">
        <h2>Installer l'application</h2>
        <form method="dialog">
          <button class="close-btn-top" aria-label="Fermer">✕</button>
        </form>
      </div>
      <div id="install-content"></div>
      <form method="dialog"><button class="close-btn">Fermer</button></form>
    </dialog>

    <!-- Le suffixe ?v=0672ee0478bb
         une mise à jour (sinon la version en cache masque les nouveautés).
         « dev » est un simple placeholder : les workflows de publication le
         remplacent automatiquement par le SHA du commit — ne jamais le
         modifier à la main. -->
    <script src="app.js?v=0672ee0478bb"></script>
  </body>
</html>
